<svg width="100%" height="100%" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4b6cb7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#182848;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="circleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  
  <!-- 装饰性圆形 -->
  <circle cx="200" cy="150" r="80" fill="url(#circleGradient)" />
  <circle cx="1000" cy="100" r="120" fill="url(#circleGradient)" />
  <circle cx="600" cy="600" r="100" fill="url(#circleGradient)" />
  <circle cx="1100" cy="700" r="60" fill="url(#circleGradient)" />
  <circle cx="100" cy="650" r="50" fill="url(#circleGradient)" />
  
  <!-- 简单的几何形状 -->
  <polygon points="500,100 550,180 450,180" fill="rgba(255,255,255,0.05)" />
  <polygon points="800,400 850,480 750,480" fill="rgba(255,255,255,0.03)" />
  <polygon points="300,500 350,580 250,580" fill="rgba(255,255,255,0.03)" />
  
  <!-- 波浪线 -->
  <path d="M0,700 Q200,650 400,700 T800,700 T1200,700 L1200,800 L0,800 Z" fill="rgba(255,255,255,0.05)" />
</svg>
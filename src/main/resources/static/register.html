<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 超时空专列</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .register-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .register-header h1 {
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .register-header p {
            color: #666;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .links {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 0.5rem;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>用户注册</h1>
            <p>欢迎加入超时空专列</p>
        </div>
        
        <div id="message" class="message"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="username">用户名:</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="email">邮箱:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码:</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn">注册</button>
        </form>
        
        <div class="links">
            <a href="login.html">已有账户？立即登录</a>
        </div>
    </div>

    <script>
        // 获取用户本地IP地址的多种方法
        function getUserIP(callback) {
            console.log("开始获取用户IP地址...");
            
            // 方法1: 尝试通过WebRTC获取本地IP
            function getIPWithWebRTC() {
                return new Promise((resolve) => {
                    try {
                        const rtc = new RTCPeerConnection({iceServers:[]});
                        let ip = null;
                        
                        rtc.onicecandidate = (ice) => {
                            if (!ice || !ice.candidate || !ice.candidate.candidate) {
                                console.log("未找到有效的ICE候选地址");
                                if (!ip) resolve(null);
                                return;
                            }
                            
                            const ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3}|[a-f0-9]{1,4}(:[a-f0-9]{1,4}){7})/;
                            const ipMatch = ipRegex.exec(ice.candidate.candidate);
                            console.log("ICE候选信息:", ice.candidate.candidate);
                            
                            if (ipMatch && ipMatch[1]) {
                                ip = ipMatch[1];
                                console.log("通过WebRTC获取到IP地址:", ip);
                                resolve(ip);
                            } else {
                                console.log("无法从ICE候选信息中提取IP地址");
                                if (!ip) resolve(null);
                            }
                        };
                        
                        rtc.createDataChannel("");
                        rtc.createOffer()
                            .then(offer => rtc.setLocalDescription(offer))
                            .catch((error) => {
                                console.log("WebRTC创建Offer失败:", error);
                                if (!ip) resolve(null);
                            });
                        
                        // 设置超时
                        setTimeout(() => {
                            console.log("WebRTC获取IP超时");
                            if (!ip) resolve(null);
                        }, 3000);
                    } catch (e) {
                        console.log("WebRTC获取IP出现异常:", e);
                        resolve(null);
                    }
                });
            }
            
            // 使用Promise链尝试多种方法
            getIPWithWebRTC()
                .then(ip => {
                    if (ip) {
                        console.log("成功获取IP地址:", ip);
                        callback(ip);
                    } else {
                        // 如果WebRTC失败，使用默认IP
                        console.log("WebRTC获取IP失败，使用默认IP: 127.0.0.1");
                        callback("127.0.0.1");
                    }
                })
                .catch((error) => {
                    console.log("获取IP过程出现错误，使用默认IP: 127.0.0.1", error);
                    callback("127.0.0.1");
                });
        }
        
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 禁用提交按钮，防止重复提交
            const submitBtn = document.querySelector('.btn');
            submitBtn.disabled = true;
            submitBtn.textContent = '注册中...';
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            console.log("开始注册流程，用户名:", username, "邮箱:", email);
            
            // 获取用户IP地址
            getUserIP(function(ip) {
                console.log("最终使用的IP地址:", ip);
                
                // 构造注册数据
                const registerData = {
                    userName: username,
                    email: email,
                    password: password,
                    Ip: ip  // 注意这里使用大写I的Ip
                };
                
                // 调试信息
                console.log("发送的注册数据:", registerData);
                
                // 发送注册请求
                fetch('/user/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(registerData)
                })
                .then(response => response.json())
                .then(data => {
                    console.log("收到注册响应:", data);
                    const messageDiv = document.getElementById('message');
                    if (data.success) {
                        messageDiv.className = 'message success';
                        messageDiv.textContent = '注册成功！请登录。';
                        messageDiv.style.display = 'block';
                        // 清空表单
                        document.getElementById('registerForm').reset();
                    } else {
                        messageDiv.className = 'message error';
                        messageDiv.textContent = '注册失败: ' + data.msg;
                        messageDiv.style.display = 'block';
                    }
                })
                .catch(error => {
                    console.log("注册请求出现错误:", error);
                    const messageDiv = document.getElementById('message');
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '网络错误: ' + error.message;
                    messageDiv.style.display = 'block';
                })
                .finally(() => {
                    // 恢复提交按钮
                    submitBtn.disabled = false;
                    submitBtn.textContent = '注册';
                });
            });
        });
    </script>
</body>
</html>

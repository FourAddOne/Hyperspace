spring:
  application:
    name: Hyperspace

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://1.15.41.43:3306/hyperspace?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: hyperspace
    password: ${DB_PASSWORD:KFaRMeZJfrWpEA3i}
    hikari:
      # 连接池名称
      pool-name: HikariCP
      # 最小空闲连接数
      minimum-idle: 1
      # 最大连接数
      maximum-pool-size: 20
      # 连接超时时间(毫秒)
      connection-timeout: 30000
      # 空闲连接超时时间(毫秒)
      idle-timeout: 600000
      # 连接最大存活时间(毫秒)，应小于MySQL的wait_timeout
      max-lifetime: 1800000
      # 连接测试查询
      connection-test-query: SELECT 1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:654321}
      database: ${REDIS_DATABASE:1}

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  web:
    resources:
      static-locations: classpath:/static/

  rabbitmq:
    host: 1.15.41.43
    port: 5672
    username: rabbitmq
    password: yZBERFfYwp3tDJba
    virtual-host: /
    listener:
      simple:
